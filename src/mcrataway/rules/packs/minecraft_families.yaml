pack_id: "minecraft_families"
description: "Known Minecraft mod malware family IOCs"
rules:
  - id: "weedhack_loaderclient"
    family: "weedhack"
    severity: "critical"
    description: "Multi-stage loader with in-memory class loading and on-chain C2 fallback"
    strings:
      - kind: "literal"
        value: "StagingHelper"
      - kind: "literal"
        value: "me/mclauncher"
      - kind: "hex"
        value: "ce6d41de"
    condition: "count() >= 2"

  - id: "fractureiser_stage0"
    family: "fractureiser"
    severity: "critical"
    description: "Fractureiser Stage 0 bytecode injector with byte-array string hiding"
    strings:
      - kind: "regex"
        value: "new\\s+String\\s*\\(\\s*new\\s+byte\\s*\\["
      - kind: "literal"
        value: "java.net.URLClassLoader"
      - kind: "regex"
        value: "85\\.217\\.144\\.130"
    condition: "count() >= 2"

  - id: "silentnet_handshake"
    family: "silentnet"
    severity: "critical"
    description: "Handshake DNS resolution with encrypted C2"
    strings:
      - kind: "literal"
        value: "cloudflare-dns.com/dns-query"
      - kind: "literal"
        value: "1.1.1.1/dns-query"
      - kind: "regex"
        value: "shard/prefireMc"
    condition: "count() >= 2"

  - id: "pussylib_token_theft"
    family: "pussylib"
    severity: "critical"
    description: "Session token theft via reflection"
    strings:
      - kind: "literal"
        value: "pussylib/pussygo"
      - kind: "literal"
        value: "getSession"
      - kind: "literal"
        value: "getAccessToken"
    condition: "count() >= 2"

  - id: "krypton_loader_stub"
    family: "krypton"
    severity: "high"
    description: "Obfuscated Fabric stub with URLClassLoader and UTF-16BE encoding"
    strings:
      - kind: "literal"
        value: "URLClassLoader"
      - kind: "literal"
        value: "UTF-16BE"
      - kind: "regex"
        value: "Error in hash"
    condition: "count() >= 2"

  - id: "makslibraries_mcmod"
    family: "makslibraries"
    severity: "high"
    description: "Forge mod with makslibraries mod ID"
    strings:
      - kind: "literal"
        value: "makslibraries"
      - kind: "literal"
        value: "mcmod.info"
    condition: "any"
