pack_id: "suspicious_indicators"
description: "Generic high-suspicion patterns found in malware"
rules:
  - id: "session_token_exfil"
    family: "credential_theft"
    severity: "critical"
    description: "Minecraft session token exfiltration pattern"
    strings:
      - kind: "literal"
        value: "getAccessToken"
      - kind: "literal"
        value: "HttpURLConnection"
      - kind: "literal"
        value: "session"
    condition: "count() >= 2"

  - id: "discord_webhook_exfil"
    family: "credential_theft"
    severity: "critical"
    description: "Discord token exfiltration via webhook"
    strings:
      - kind: "regex"
        value: "discord\\.com/api/webhooks/"
      - kind: "literal"
        value: "getToken"
      - kind: "literal"
        value: "discord_token"
    condition: "count() >= 2"

  - id: "native_payload_staging"
    family: "native_staging"
    severity: "critical"
    description: "Native DLL staging via JNIC"
    strings:
      - kind: "literal"
        value: "System.load"
      - kind: "literal"
        value: "createTempFile"
      - kind: "literal"
        value: "deleteOnExit"
      - kind: "literal"
        value: ".dll"
    condition: "count() >= 3"

  - id: "onchain_c2_resolver"
    family: "onchain_c2"
    severity: "critical"
    description: "Ethereum blockchain C2 resolution"
    strings:
      - kind: "hex"
        value: "ce6d41de"
      - kind: "literal"
        value: "eth_call"
      - kind: "literal"
        value: "verify"
    condition: "count() >= 2"

  - id: "in_memory_classloader"
    family: "dynamic_loading"
    severity: "high"
    description: "In-memory class loading without disk artifacts"
    strings:
      - kind: "literal"
        value: "defineClass"
      - kind: "literal"
        value: "URLClassLoader"
      - kind: "regex"
        value: "JarInputStream"
    condition: "count() >= 2"

  - id: "obfuscated_string_cipher"
    family: "obfuscation"
    severity: "high"
    description: "Custom string cipher with S-box and XOR"
    strings:
      - kind: "regex"
        value: "new\\s+String\\s*\\(\\s*new\\s+byte"
      - kind: "literal"
        value: "Helper.load"
      - kind: "literal"
        value: "decode"
    condition: "count() >= 2"
