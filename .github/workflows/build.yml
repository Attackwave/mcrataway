name: Build Standalone Binaries

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Run Build Script
        run: |
          python scripts/build.py

      - name: Determine Binary Artifact Name
        id: artifact_name
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            echo "BINARY_PATH=dist_win/mcrataway.exe" >> $GITHUB_ENV
            echo "ARTIFACT_NAME=mcrataway-windows-amd64.exe" >> $GITHUB_ENV
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "BINARY_PATH=dist/mcrataway" >> $GITHUB_ENV
            echo "ARTIFACT_NAME=mcrataway-macos-universal" >> $GITHUB_ENV
          else
            echo "BINARY_PATH=dist/mcrataway" >> $GITHUB_ENV
            echo "ARTIFACT_NAME=mcrataway-linux-x86_64" >> $GITHUB_ENV
          fi

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.BINARY_PATH }}
          if-no-files-found: error
